<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet">
    <link href="stylesheet.css" rel="stylesheet">

    <title>Deep Convolutional Neural
        Networks</title>
</head>
<style>
    body {
        width: 100vw;
        height: 100vh;
        background: rgb(228, 228, 228);
    }
</style>

<body>
    <!--Website Container-->
    <div class="body-container">
        <div class="title">
            AI Image Upscaling Uspscaling Using Super Resolution Techniques Using Deep Convolutional Neural
            Networks
        </div>
        <div class="upload-image-container">
            <button type="button" class="btn btn-primary upload-button">Upload Image(s) <i
                    class="fas fa-upload"></i></button>
            <input type="file" id="hiddenFileInput" style="display: none;" onchange="handleFileUpload(this)">
            <a href="#" class="text-primary my-custom-link">Want to enlarge more images faster and with more stability?
                Login!</a>
        </div>
        <div class="button-container">
            <button id="dyslexiaAssistButton" class="btn btn-secondary language-module"
                onclick="activateDyslexiaAssist()">
                Dyslexia Mode
            </button>

            <div class="dropdown">
                <!-- Trigger -->
                <button class="btn btn-secondary dropdown-toggle colour-module" type="button" id="dropdownMenuButton"
                    data-bs-toggle="dropdown" aria-expanded="false">
                    Colourblind Mode
                </button>

                <!-- Dropdown Menu -->
                <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                    <li><a class="dropdown-item" href="#">No Colour Blindess</a></li>
                    <li><a class="dropdown-item" href="#">Deuteranopia</a></li>
                    <li><a class="dropdown-item" href="#">Protanopia</a></li>
                    <li><a class="dropdown-item" href="#">Tritanopia</a></li>
                    <li><a class="dropdown-item" href="#">Monochromatism</a></li>
                </ul>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>

</html>
